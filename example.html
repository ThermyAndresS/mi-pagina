<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de Página Simple</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        img {
            max-width: 400px;
            display: block;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Bienvenido a mi página</h1>
    <p>Este es un ejemplo de archivo HTML con texto e imágenes fijas.</p>
    
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Example.jpg/320px-Example.jpg" alt="Imagen de ejemplo">
    
    <p>El contenido es estático, no tiene interacción ni scripts.</p>
</body>
</html>
